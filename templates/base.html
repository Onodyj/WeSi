<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SiteIQ{% endblock %}</title>
    <meta name="description" content="SiteIQ web dashboard">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        :root {
            --siq-brand: #6f42c1;
            --siq-brand-2: #0d6efd;
            --siq-success: #20c997;
            --siq-danger: #dc3545;
            --siq-warning: #f59f00;
            --siq-info: #0dcaf0;
            --siq-card-shadow: 0 1rem 2.5rem rgba(15, 23, 42, 0.08);
            --siq-card-shadow-hover: 0 1.5rem 3rem rgba(15, 23, 42, 0.14);
            --siq-border: rgba(148, 163, 184, 0.22);
            --siq-bg-soft: rgba(99, 102, 241, 0.08);
            --siq-text-soft: #64748b;
        }

        [data-bs-theme="dark"] {
            --siq-bg-soft: rgba(255, 255, 255, 0.06);
            --siq-border: rgba(148, 163, 184, 0.28);
            --siq-text-soft: #94a3b8;
            color-scheme: dark;
        }

        html, body {
            min-height: 100%;
        }

        body {
            background:
                radial-gradient(circle at top left, rgba(111, 66, 193, 0.12), transparent 32%),
                radial-gradient(circle at top right, rgba(13, 110, 253, 0.10), transparent 28%),
                var(--bs-body-bg);
        }

        .siteiq-navbar {
            backdrop-filter: blur(14px);
            background: color-mix(in srgb, var(--bs-body-bg) 82%, transparent);
            border-bottom: 1px solid var(--siq-border);
        }

        .siteiq-logo {
            font-weight: 800;
            letter-spacing: -0.03em;
            color: var(--bs-emphasis-color);
        }

        .siteiq-logo-mark {
            width: 2.2rem;
            height: 2.2rem;
            display: inline-grid;
            place-items: center;
            border-radius: 0.85rem;
            color: #fff;
            background: linear-gradient(135deg, var(--siq-brand), var(--siq-brand-2));
            box-shadow: 0 0.75rem 1.5rem rgba(111, 66, 193, 0.25);
        }

        .main-shell {
            padding-top: 5rem;
            padding-bottom: 3rem;
        }

        .glass-card,
        .section-card {
            background: color-mix(in srgb, var(--bs-body-bg) 94%, transparent);
            border: 1px solid var(--siq-border);
            box-shadow: var(--siq-card-shadow);
            border-radius: 1.5rem;
        }

        .section-card {
            padding: 1.5rem;
        }

        .soft-label {
            color: var(--siq-text-soft);
        }

        .text-gradient {
            background: linear-gradient(135deg, var(--siq-brand), var(--siq-brand-2));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .footer-shell {
            border-top: 1px solid var(--siq-border);
            color: var(--siq-text-soft);
            background: color-mix(in srgb, var(--bs-body-bg) 92%, transparent);
            backdrop-filter: blur(10px);
        }

        .btn-brand {
            --bs-btn-color: #fff;
            --bs-btn-bg: linear-gradient(135deg, var(--siq-brand), var(--siq-brand-2));
            --bs-btn-border-color: transparent;
            background-image: linear-gradient(135deg, var(--siq-brand), var(--siq-brand-2));
            border: none;
            box-shadow: 0 0.75rem 1.75rem rgba(99, 102, 241, 0.3);
        }

        .btn-brand:hover,
        .btn-brand:focus {
            color: #fff;
            opacity: 0.95;
        }

        .theme-toggle .btn {
            border-radius: 999px;
        }

        .copy-feedback {
            transition: opacity 0.25s ease;
        }

        @media (max-width: 991.98px) {
            .main-shell {
                padding-top: 4.5rem;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg fixed-top siteiq-navbar">
    <div class="container py-2">
        <a class="navbar-brand d-flex align-items-center gap-2 siteiq-logo" href="/">
            <span class="siteiq-logo-mark">S</span>
            <span>SiteIQ</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#siteiqNav" aria-controls="siteiqNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="siteiqNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-2">
                <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="/settings">Settings</a></li>
                <li class="nav-item ms-lg-2 theme-toggle">
                    <button class="btn btn-outline-secondary btn-sm px-3" id="themeToggle" type="button" aria-label="Toggle dark mode">
                        <span id="themeToggleIcon">🌙</span>
                        <span class="ms-1" id="themeToggleText">Dark</span>
                    </button>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="main-shell">
    {% block content %}{% endblock %}
</main>

<footer class="footer-shell py-4 mt-auto">
    <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-2">
        <small>Powered by SiteIQ</small>
        <small>Actionable website intelligence for SEO, UX, and growth teams.</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script>
    (() => {
        const storageKey = 'siteiq-theme';
        const root = document.documentElement;
        const button = document.getElementById('themeToggle');
        const icon = document.getElementById('themeToggleIcon');
        const text = document.getElementById('themeToggleText');

        function getPreferredTheme() {
            const stored = localStorage.getItem(storageKey);
            if (stored === 'light' || stored === 'dark') {
                return stored;
            }
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function applyTheme(theme) {
            root.setAttribute('data-bs-theme', theme);
            if (icon) {
                icon.textContent = theme === 'dark' ? '☀️' : '🌙';
            }
            if (text) {
                text.textContent = theme === 'dark' ? 'Light' : 'Dark';
            }
        }

        applyTheme(getPreferredTheme());

        if (button) {
            button.addEventListener('click', () => {
                const next = root.getAttribute('data-bs-theme') === 'dark' ? 'light' : 'dark';
                localStorage.setItem(storageKey, next);
                applyTheme(next);
            });
        }
    })();
</script>
{% block extra_js %}{% endblock %}
</body>
</html>
