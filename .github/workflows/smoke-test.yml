name: Smoke Tests

on:
  push:
    branches: [ main, copilot/** ]
  pull_request:
    branches: [ main ]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Upgrade pip
      run: |
        python -m pip install --upgrade pip
    
    - name: Install dependencies
      run: |
        pip install -r requirements.txt
    
    - name: Run smoke test with example_usage.py
      run: |
        python example_usage.py || echo "example_usage.py failed, trying fallback"
      continue-on-error: true
    
    - name: Run fallback smoke test
      run: |
        python -c "from wesi import WebsiteAnalyzer; analyzer = WebsiteAnalyzer('https://example.com', max_pages=1); analyzer.crawl(); print('Smoke test passed')"
    
    - name: Check for generated reports
      run: |
        ls -la *.json || echo "No JSON reports found"
    
    - name: Upload smoke test artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: smoke-test-reports-py${{ matrix.python-version }}
        path: |
          *.json
          !package*.json
        if-no-files-found: ignore
